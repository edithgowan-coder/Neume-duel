<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neume Duel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:#f5f0e8;color:#2b2015;min-height:100vh;padding:20px}
h1{text-align:center;font-size:26px;color:#6b3d0f;margin-bottom:4px}
.sub{text-align:center;font-size:13px;color:#8c7355;font-style:italic;margin-bottom:18px}
#intro{max-width:540px;margin:0 auto}
.icard{background:#fff;border:1px solid #d9c9aa;border-radius:12px;padding:20px 24px;margin-bottom:14px}
.icard h2{font-size:16px;color:#6b3d0f;margin-bottom:8px}
.icard p{font-size:13px;color:#5a4030;line-height:1.6;margin-bottom:12px}
.lvlgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.lvlbtn{background:#fff;border:1px solid #d9c9aa;border-radius:8px;padding:12px;cursor:pointer;text-align:left;font-family:Georgia,serif;transition:border-color .15s,background .15s}
.lvlbtn:hover{border-color:#8c5b20;background:#fdf7ef}
.lvlbtn.sel{border-color:#8c5b20;border-width:2px}
.lvlbtn .ln{font-size:11px;color:#a08060;margin-bottom:2px}
.lvlbtn .lname{font-size:13px;color:#3d2010;font-weight:bold}
.inlist{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.inp{text-align:center;font-size:10px;color:#6b3d0f}
.inp img{display:block;width:56px;height:36px;object-fit:contain;background:#fafaf7;border:1px solid #e8d9c0;border-radius:4px;padding:2px;margin:0 auto 3px}
.inp em{color:#8c5b20;font-style:normal;font-weight:bold}
#game{display:none;max-width:700px;margin:0 auto}
.ghdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ghdr h2{font-size:14px;color:#6b3d0f}
.smbtn{background:transparent;border:1px solid #c4a87a;color:#6b3d0f;padding:5px 12px;border-radius:6px;cursor:pointer;font-family:Georgia,serif;font-size:12px}
.smbtn:hover{background:#f5ece0}
#board{display:flex;justify-content:space-between;align-items:center;background:#fff;border:1px solid #d9c9aa;border-radius:12px;padding:16px 10px;margin-bottom:6px;position:relative}
.track{position:absolute;top:50%;left:28px;right:28px;height:2px;background:#e0d0b8;z-index:1}
.pn{width:30px;height:30px;border-radius:50%;background:#f5f0e8;border:1px solid #c4a87a;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;color:#8c7355;z-index:2;transition:all .25s;flex-shrink:0}
.pn.active{background:#8c5b20;color:#fff;border-color:#8c5b20;transform:scale(1.3)}
.pn.gp{border-color:#2a7a40;border-width:2px}
.pn.gn{border-color:#c0392b;border-width:2px}
#blbl{display:flex;justify-content:space-between;font-size:10px;color:#a08060;margin-bottom:12px}
#status{text-align:center;font-size:14px;color:#3d2b10;min-height:22px;margin-bottom:12px;font-style:italic}
#hand{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
.card{background:#fff;border:1px solid #d9c9aa;border-radius:10px;padding:10px 6px 8px;width:108px;text-align:center;cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s;display:flex;flex-direction:column;align-items:center;gap:4px}
.card:hover{transform:translateY(-5px);box-shadow:0 6px 16px rgba(100,60,0,.15);border-color:#8c5b20}
.card:active{transform:translateY(-2px) scale(.97)}
.card h3{font-size:11px;font-weight:bold;color:#6b3d0f}
.cdesc{font-size:10px;color:#5a4030;line-height:1.3}
.bdg{font-size:11px;font-weight:bold;padding:1px 8px;border-radius:10px}
.up{background:#e8f5e9;color:#2a7a40}
.dn{background:#fdecea;color:#c0392b}
.st{background:#f0ede0;color:#6b6b40}
.sp{background:#fff3cd;color:#7a5800}
.gb{width:76px;height:48px;border:1px solid #e8d9c0;border-radius:5px;background:#fafaf7;display:flex;align-items:center;justify-content:center;overflow:hidden}
.gb img{max-width:70px;max-height:44px;object-fit:contain}
#btns{display:flex;gap:10px;justify-content:center;margin-bottom:14px}
.pbtn{background:#8c5b20;color:#fff;border:none;padding:9px 22px;border-radius:7px;cursor:pointer;font-family:Georgia,serif;font-size:13px}
.pbtn:hover{background:#6b3d0f}


#ai-play{display:flex;flex-direction:column;align-items:center;gap:6px}
#ai-play .ai-label{font-size:11px;color:#a08060;font-style:italic;letter-spacing:.03em}
#ai-play .card{border-color:#c0392b;cursor:default;opacity:0.92}
#ai-play .card:hover{transform:none;box-shadow:none;border-color:#c0392b}

#toggles{display:flex;gap:16px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
.tog{display:flex;align-items:center;gap:6px;font-size:12px;color:#6b3d0f}
.togbtn{background:#fff;border:1px solid #c4a87a;color:#6b3d0f;padding:4px 12px;border-radius:14px;cursor:pointer;font-family:Georgia,serif;font-size:12px;font-weight:bold;transition:background .15s,color .15s}
.togbtn.active{background:#8c5b20;color:#fff;border-color:#8c5b20}
.cdesc.hidden{display:none}
.bdg.hidden{display:none}

#log{background:#ede5d5;border:1px solid #d9c9aa;border-radius:6px;padding:10px 14px;max-height:100px;overflow-y:auto;font-size:12px;color:#5a4030;line-height:1.7}
#prog{display:flex;gap:5px;justify-content:center;margin-bottom:12px}
.dot{width:9px;height:9px;border-radius:50%;background:#d9c9aa}
.dot.done{background:#8c5b20}
.dot.cur{background:#8c5b20;box-shadow:0 0 0 3px #e8d9c0}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
#modal.open{display:flex}
#mbox{background:#fff;border-radius:14px;padding:28px 32px;text-align:center;max-width:340px;width:90%}
#mbox h2{font-size:20px;color:#6b3d0f;margin-bottom:10px}
#mbox p{font-size:13px;color:#5a4030;margin-bottom:18px;line-height:1.6}
</style>
</head>
<body>
<h1>Neume Duel</h1>
<div class="sub">Learn Byzantine chant notation through battle</div>

<div id="intro">
  <div class="icard">
    <h2>Choose a level</h2>
    <div class="lvlgrid" id="lvlgrid"></div>
    <button class="pbtn" onclick="beginLevel()">Play Selected Level</button>
  </div>
  <div class="icard" id="idetail">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
      <h2 id="ititle" style="margin:0;"></h2>
      <button class="togbtn" id="tog-subset" onclick="toggleSubset()" style="font-size:11px;padding:3px 10px;">One of each</button>
    </div>
    <p id="idesc"></p>
    <div class="inlist" id="inlist"></div>
  </div>
</div>

<div id="game">
  <div class="ghdr">
    <div id="prog"></div>
    <h2 id="lvllbl"></h2>
    <button class="smbtn" onclick="goIntro()">&#8592; Levels</button>
  </div>
  <div id="board"><div class="track"></div></div>
  <div id="blbl"><span>&#8592; AI goal</span><span>Ison</span><span>Your goal &#8594;</span></div>
  <div id="status"></div>
  <div id="hand"></div>
  <div id="ai-play" style="display:none;margin-bottom:14px;"></div>
  <div id="btns"><button class="pbtn" onclick="restartLevel()">Restart</button></div>
  <div id="toggles">
    <span class="tog"><span>Difficulty:</span> <button class="togbtn active" id="tog-easy" onclick="toggleEasy()">Normal</button></span>
    <span class="tog"><span>My goal:</span> <button class="togbtn active" id="tog-side" onclick="toggleSide()">Ascend (+)</button></span>
    <span class="tog"><span>Card hints:</span> <button class="togbtn active" id="tog-hints" onclick="toggleHints()">Shown</button></span>
  </div>
  <div id="log"></div>
</div>

<div id="modal">
  <div id="mbox">
    <h2 id="mtitle"></h2>
    <p id="mmsg"></p>
    <button class="pbtn" id="mbtn" onclick="modalAction()"></button>
  </div>
</div>

let curLvl=0, pitch=0, dead=false, mcb=null, playerSign=1;


let hintsShown = true;

function toggleEasy(){
  difficulty = difficulty==='easy' ? 'normal' : difficulty==='normal' ? 'hard' : 'easy';
  const btn=document.getElementById('tog-easy');
  btn.textContent = difficulty==='easy' ? 'Easy' : difficulty==='hard' ? 'Hard' : 'Normal';
  btn.style.background = difficulty==='hard' ? '#7a1a1a' : difficulty==='easy' ? '#2a6a3a' : '';
  btn.style.borderColor = difficulty==='hard' ? '#7a1a1a' : difficulty==='easy' ? '#2a6a3a' : '';
  btn.classList.add('active');
}

function toggleSide(){
  playerSign = -playerSign;
  const btn = document.getElementById('tog-side');
  if(playerSign===1){
    btn.textContent='Ascend (+)'; btn.classList.add('active');
  } else {
    btn.textContent='Descend (−)'; btn.classList.remove('active');
  }
  restartLevel();
}

function toggleHints(){
  hintsShown = !hintsShown;
  const btn = document.getElementById('tog-hints');
  btn.textContent = hintsShown ? 'Shown' : 'Hidden';
  hintsShown ? btn.classList.add('active') : btn.classList.remove('active');
  document.querySelectorAll('.bdg, .cdesc').forEach(el => {
    hintsShown ? el.classList.remove('hidden') : el.classList.add('hidden');
  });
}

function goIntro(){
  document.getElementById('intro').style.display='block';
  document.getElementById('game').style.display='none';
  buildGrid(); showDetail();
}

function buildGrid(){
  const g=document.getElementById('lvlgrid'); g.innerHTML='';
  LEVELS.forEach((l,i)=>{
    const b=document.createElement('button');
    b.className='lvlbtn'+(i===curLvl?' sel':'');
    b.innerHTML='<div class="ln">Level '+(i+1)+'</div><div class="lname">'+l.name+'</div>';
    b.onclick=()=>{curLvl=i;buildGrid();showDetail();};
    g.appendChild(b);
  });
}

let showAllNeumes = false;
let difficulty = 'normal';

function toggleSubset(){
  showAllNeumes = !showAllNeumes;
  const btn=document.getElementById('tog-subset');
  btn.textContent = showAllNeumes ? 'All neumes' : 'One of each';
  showAllNeumes ? btn.classList.add('active') : btn.classList.remove('active');
  renderNeumeList();
}

function getSubset(pool){
  // One of each unique key (deduplicate by key)
  const seen=new Set();
  return pool.filter(c=>{ if(seen.has(c.key)) return false; seen.add(c.key); return true; });
}

function renderNeumeList(){
  const l=LEVELS[curLvl];
  const cards = showAllNeumes ? l.pool : getSubset(l.pool);
  const nl=document.getElementById('inlist'); nl.innerHTML='';
  cards.forEach(c=>{
    const d=document.createElement('div'); d.className='inp';
    const s=c.effect>0?'+'+c.effect:c.effect===0?'0':''+c.effect;
    d.innerHTML='<img src="'+NEUME_IMGS[c.key]+'" alt="'+c.name+'"><span>'+c.name+'<br><em>'+s+'</em></span>';
    nl.appendChild(d);
  });
}

function showDetail(){
  const l=LEVELS[curLvl];
  document.getElementById('ititle').textContent='Level '+(curLvl+1)+' — '+l.name;
  document.getElementById('idesc').textContent=l.desc;
  renderNeumeList();
}

function beginLevel(){
  document.getElementById('intro').style.display='none';
  document.getElementById('game').style.display='block';
  restartLevel();
}

function buildBoard(){
  const g=LEVELS[curLvl].goal, b=document.getElementById('board');
  b.innerHTML='<div class="track"></div>';
  for(let v=-g;v<=g;v++){
    const n=document.createElement('div');
    const isPlayerGoal=(v===playerSign*g), isAiGoal=(v===-playerSign*g);
    n.className='pn'+(isPlayerGoal?' gp':isAiGoal?' gn':'');
    n.id='pn'+v;
    n.textContent=v===0?'0':v>0?'+'+v:''+v;
    b.appendChild(n);
  }
}

function updateBoard(){
  document.querySelectorAll('.pn').forEach(n=>n.classList.remove('active'));
  const e=document.getElementById('pn'+pitch); if(e) e.classList.add('active');
}

function updateProg(){
  const p=document.getElementById('prog'); p.innerHTML='';
  LEVELS.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i<curLvl?' done':i===curLvl?' cur':'');
    p.appendChild(d);
  });
}

function drawHand(){
  const l=LEVELS[curLvl], h=document.getElementById('hand'); h.innerHTML='';
  for(let i=0;i<l.handSize;i++){
    const c=l.pool[Math.floor(Math.random()*l.pool.length)];
    const d=document.createElement('div'); d.className='card';
    const s=c.effect>0?'+'+c.effect:c.effect===0?'0':''+c.effect;
    const bc=c.skip?'sp':(c.cls||'st');
    d.innerHTML='<h3>'+c.name+'</h3><div class="gb"><img src="'+NEUME_IMGS[c.key]+'" alt="'+c.name+'"></div>'
      +'<span class="bdg '+bc+'">'+s+(c.skip?' &#9733;':'')+'</span><div class="cdesc">'+c.desc+'</div>';
    d.onclick=()=>{if(!dead) playCard(c);};
    if(!hintsShown){ d.querySelectorAll && setTimeout(()=>{ d.querySelectorAll('.bdg,.cdesc').forEach(el=>el.classList.add('hidden')); },0); }
    h.appendChild(d);
  }
}

function addLog(msg){const e=document.getElementById('log');e.innerHTML+=(e.innerHTML?'<br>':'')+msg;e.scrollTop=e.scrollHeight;}
function setStatus(msg){document.getElementById('status').textContent=msg;}
function clamp(v){const g=LEVELS[curLvl].goal;return Math.max(-g,Math.min(g,v));}

function checkEnd(){
  const g=LEVELS[curLvl].goal;
  if(pitch*playerSign>=g){
    const last=curLvl===LEVELS.length-1;
    showModal('Harmonic Ascension! \u2746',
      last?'You have mastered all levels.':'You pushed the melody to the heights! Ready for the next level?',
      last?'Play Again':'Next Level \u2192',
      ()=>{if(!last){curLvl++;goIntro();}else{curLvl=0;goIntro();}});
    dead=true; return true;
  }
  if(pitch*playerSign<=-g){
    showModal('Into the Depths','The AI overwhelmed your chant. Try again?','Retry',restartLevel);
    dead=true; return true;
  }
  return false;
}

function showAICard(c, eff){
  const area=document.getElementById('ai-play');
  const s=eff>=0?'+'+eff:''+eff;
  const bc=c.skip?'sp':(c.cls||'st');
  area.innerHTML='<div class="ai-label">AI plays…</div>';
  const d=document.createElement('div'); d.className='card';
  d.innerHTML='<h3>'+c.name+'</h3><div class="gb"><img src="'+NEUME_IMGS[c.key]+'" alt="'+c.name+'"></div>'
    +'<span class="bdg '+bc+'">'+(hintsShown?s:'')+'</span>'
    +'<div class="cdesc">'+(hintsShown?c.desc:'')+'</div>';
  area.appendChild(d);
  area.style.display='flex';
}

function hideAICard(){
  const area=document.getElementById('ai-play');
  area.style.display='none';
  area.innerHTML='';
}

function aiTurn(){
  const l=LEVELS[curLvl],pool=l.pool;
  const aiDir=-playerSign;
  let aiPool=pool.filter(x=>Math.sign(x.effect)===aiDir||x.effect===0);
  let c;
  if(difficulty==='easy'){
    // Easy: only ±1, and 40% chance of wasting turn on Ison
    const small=aiPool.filter(x=>Math.abs(x.effect)<=1);
    if(small.length) aiPool=small;
    if(Math.random()<0.4){
      const ison=pool.find(x=>x.effect===0);
      if(ison){ c=ison; }
    }
    if(!c){ c=aiPool[Math.floor(Math.random()*aiPool.length)]; }
  } else if(difficulty==='normal'){
    // Normal: random pick from ±1–3 only, so big jumps never happen
    const mid=aiPool.filter(x=>Math.abs(x.effect)<=3);
    const src=mid.length?mid:aiPool;
    c=src[Math.floor(Math.random()*src.length)];
  } else {
    // Hard: always picks biggest available move (smartAI regardless of level setting)
    const helpful=aiPool.filter(x=>x.effect!==0);
    c=helpful.length?helpful.reduce((a,b)=>Math.abs(a.effect)>Math.abs(b.effect)?a:b):aiPool[Math.floor(Math.random()*aiPool.length)];
  }
  // No flipping needed - card naturally moves in AI's direction
  const eff=c.effect;
  pitch=clamp(pitch+eff);
  updateBoard();
  showAICard(c, eff);
  addLog('AI \u25b8 <strong>'+c.name+'</strong> ('+(eff>=0?'+':'')+eff+') \u2014 pitch: <strong>'+pitch+'</strong>');
  if(!checkEnd()){
    setStatus('Your turn \u2014 play a neume');
    setTimeout(()=>{ hideAICard(); drawHand(); }, 3000);
  }
}

function playCard(c){
  hideAICard();
  const eff=c.effect;
  pitch=clamp(pitch+eff);
  updateBoard();
  addLog('You \u25b8 <strong>'+c.name+'</strong> ('+(eff>=0?'+':'')+eff+') \u2014 pitch: <strong>'+pitch+'</strong>');
  if(checkEnd()) return;
  if(c.skip){setStatus('Kentemata! AI skipped \u2014 play again.');drawHand();return;}
  document.getElementById('hand').innerHTML='';
  setStatus('AI is chanting\u2026');
  dead=true;
  setTimeout(()=>{dead=false;aiTurn();},700);
}

function restartLevel(){
  const l=LEVELS[curLvl];
  pitch=0;dead=false;
  // playerSign set by toggle
  const pGoal=playerSign*l.goal, aiGoal=-playerSign*l.goal;
  document.getElementById('lvllbl').textContent='Level '+(curLvl+1)+' \u2014 '+l.name;
  buildBoard();updateBoard();updateProg();
  const lbl=document.getElementById('blbl');
  if(playerSign===1){
    lbl.innerHTML='<span>\u2190 AI goal (\u2212'+l.goal+')</span><span>Ison</span><span>Your goal (+'+l.goal+') \u2192</span>';
  } else {
    lbl.innerHTML='<span>\u2190 Your goal (\u2212'+l.goal+')</span><span>Ison</span><span>AI goal (+'+l.goal+') \u2192</span>';
  }
  document.getElementById('log').innerHTML='<strong>Goal:</strong> reach '+(playerSign>0?'+':'\u2212')+l.goal+' before AI reaches '+(playerSign>0?'\u2212':'+')+l.goal+'.';
  setStatus('Your turn \u2014 play a neume');
  drawHand();
}

function showModal(title,msg,btn,cb){
  document.getElementById('mtitle').textContent=title;
  document.getElementById('mmsg').textContent=msg;
  document.getElementById('mbtn').textContent=btn;
  mcb=cb;
  document.getElementById('modal').classList.add('open');
}

function modalAction(){
  document.getElementById('modal').classList.remove('open');
  if(mcb) mcb();
}

goIntro();
</script>
